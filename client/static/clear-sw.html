<!DOCTYPE html>
<html>
<head>
    <title>Clear Service Worker</title>
</head>
<body>
    <h1>Clearing Service Worker...</h1>
    <p id="status">Please wait...</p>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
                document.getElementById('status').innerHTML = 'Service worker cleared! <a href="/">Go to home</a>';
            });
        } else {
            document.getElementById('status').innerHTML = 'No service worker found. <a href="/">Go to home</a>';
        }
    </script>
</body>
</html>
